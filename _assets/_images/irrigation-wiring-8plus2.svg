<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1180" viewBox="0 0 1800 1180" role="img" aria-labelledby="title desc">
  <title id="title">GardenIrrigationControl Wiring Diagram 8 plus 2</title>
  <desc id="desc">Wiring overview for an ESP32 controlling 10 valves, with 8 irrigation valves and 2 auxiliary valves.</desc>
  <style>
    .bg { fill: #f7f3ea; }
    .panel { fill: #fffdf8; stroke: #3f3a33; stroke-width: 2; rx: 18; ry: 18; }
    .esp { fill: #dbeafe; stroke: #1d4ed8; stroke-width: 2; rx: 18; ry: 18; }
    .ssr8 { fill: #fee2e2; stroke: #b91c1c; stroke-width: 2; rx: 18; ry: 18; }
    .ssr2 { fill: #fde68a; stroke: #b45309; stroke-width: 2; rx: 18; ry: 18; }
    .valve { fill: #dcfce7; stroke: #15803d; stroke-width: 2; rx: 12; ry: 12; }
    .btn { fill: #ede9fe; stroke: #6d28d9; stroke-width: 2; rx: 10; ry: 10; }
    .sensor { fill: #cffafe; stroke: #0f766e; stroke-width: 2; rx: 10; ry: 10; }
    .title { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #201a15; }
    .subtitle { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #4b5563; }
    .head { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #201a15; }
    .text { font: 15px 'Segoe UI', Arial, sans-serif; fill: #201a15; }
    .small { font: 13px 'Segoe UI', Arial, sans-serif; fill: #374151; }
    .note { font: 14px 'Segoe UI', Arial, sans-serif; fill: #7c2d12; }
    .wire { fill: none; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
    .sig { stroke: #2563eb; }
    .pwr5 { stroke: #dc2626; }
    .pwr33 { stroke: #ea580c; }
    .gnd { stroke: #111827; }
    .dash { stroke-dasharray: 8 7; }
  </style>

  <rect class="bg" x="0" y="0" width="1800" height="1180"/>

  <text class="title" x="60" y="58">GardenIrrigationControl Verdrahtungsdiagramm</text>
  <text class="subtitle" x="60" y="88">Zielaufbau: 10 Ventile gesamt, davon 8 Beregnungsventile plus 2 Zusatzventile. Firmware bleibt unveraendert.</text>

  <rect class="panel" x="40" y="120" width="260" height="190"/>
  <text class="head" x="65" y="155">Versorgung</text>
  <text class="text" x="65" y="190">5V / VIN fuer ESP32</text>
  <text class="text" x="65" y="220">5V fuer SSR-Module</text>
  <text class="text" x="65" y="250">3.3V fuer Taster / DHT11</text>
  <text class="text" x="65" y="280">Gemeinsame Masse</text>

  <rect class="esp" x="360" y="140" width="380" height="640"/>
  <text class="head" x="390" y="180">ESP32 DevKit C V4</text>
  <text class="small" x="390" y="208">Zentrale Steuerung</text>
  <text class="small" x="390" y="238">Ausgaenge zu SSR:</text>
  <text class="text" x="390" y="270">Ventil 1  - GPIO27</text>
  <text class="text" x="390" y="300">Ventil 2  - GPIO26</text>
  <text class="text" x="390" y="330">Ventil 3  - GPIO25</text>
  <text class="text" x="390" y="360">Ventil 4  - GPIO33</text>
  <text class="text" x="390" y="390">Ventil 5  - GPIO32</text>
  <text class="text" x="390" y="420">Ventil 6  - GPIO23</text>
  <text class="text" x="390" y="450">Ventil 7  - GPIO22</text>
  <text class="text" x="390" y="480">Ventil 8  - GPIO21</text>
  <text class="text" x="390" y="510">Ventil 9  - GPIO19</text>
  <text class="text" x="390" y="540">Ventil 10 - GPIO TBD</text>
  <text class="small" x="390" y="585">Taster-Eingaenge:</text>
  <text class="text" x="390" y="615">B1..B8: GPIO14,13,15,2,4,16,17,5</text>
  <text class="text" x="390" y="645">B9: GPIO18</text>
  <text class="text" x="390" y="675">B10: GPIO TBD</text>
  <text class="text" x="390" y="730">Optional DHT11: DATA an GPIO12</text>

  <rect class="ssr8" x="840" y="130" width="360" height="520"/>
  <text class="head" x="870" y="170">8-Kanal SSR-Modul</text>
  <text class="small" x="870" y="198">Beregnungsventile 1 bis 8</text>
  <text class="text" x="870" y="240">IN1  - Ventil 1</text>
  <text class="text" x="870" y="275">IN2  - Ventil 2</text>
  <text class="text" x="870" y="310">IN3  - Ventil 3</text>
  <text class="text" x="870" y="345">IN4  - Ventil 4</text>
  <text class="text" x="870" y="380">IN5  - Ventil 5</text>
  <text class="text" x="870" y="415">IN6  - Ventil 6</text>
  <text class="text" x="870" y="450">IN7  - Ventil 7</text>
  <text class="text" x="870" y="485">IN8  - Ventil 8</text>
  <text class="text" x="870" y="535">VCC - 5V</text>
  <text class="text" x="870" y="570">GND - GND</text>
  <text class="note" x="870" y="615">Low-Level-Trigger:</text>
  <text class="note" x="870" y="640">LOW = Ventil an</text>

  <rect class="ssr2" x="840" y="700" width="360" height="190"/>
  <text class="head" x="870" y="740">2-Kanal Zusatzmodul</text>
  <text class="small" x="870" y="768">Zusatzventile 9 und 10</text>
  <text class="text" x="870" y="808">IN9  - Ventil 9  - GPIO19</text>
  <text class="text" x="870" y="843">IN10 - Ventil 10 - GPIO TBD</text>
  <text class="text" x="870" y="878">VCC / GND wie beim 8-Kanal-Modul</text>

  <rect class="panel" x="1280" y="100" width="460" height="780"/>
  <text class="head" x="1310" y="140">Ventile</text>
  <rect class="valve" x="1310" y="175" width="180" height="44"/>
  <rect class="valve" x="1510" y="175" width="180" height="44"/>
  <rect class="valve" x="1310" y="235" width="180" height="44"/>
  <rect class="valve" x="1510" y="235" width="180" height="44"/>
  <rect class="valve" x="1310" y="295" width="180" height="44"/>
  <rect class="valve" x="1510" y="295" width="180" height="44"/>
  <rect class="valve" x="1310" y="355" width="180" height="44"/>
  <rect class="valve" x="1510" y="355" width="180" height="44"/>
  <rect class="valve" x="1310" y="470" width="180" height="54"/>
  <rect class="valve" x="1510" y="470" width="180" height="54"/>

  <text class="text" x="1360" y="203">Ventil 1</text>
  <text class="text" x="1560" y="203">Ventil 2</text>
  <text class="text" x="1360" y="263">Ventil 3</text>
  <text class="text" x="1560" y="263">Ventil 4</text>
  <text class="text" x="1360" y="323">Ventil 5</text>
  <text class="text" x="1560" y="323">Ventil 6</text>
  <text class="text" x="1360" y="383">Ventil 7</text>
  <text class="text" x="1560" y="383">Ventil 8</text>
  <text class="text" x="1340" y="502">Ventil 9 Zusatz</text>
  <text class="text" x="1540" y="502">Ventil 10 Zusatz</text>

  <text class="small" x="1310" y="435">Ventile 1 bis 8 = Beregnung</text>
  <text class="small" x="1310" y="555">Ventile 9 bis 10 = z. B. Hauptventil / Drainage</text>

  <rect class="panel" x="40" y="360" width="260" height="560"/>
  <text class="head" x="65" y="400">Lokale Taster</text>
  <rect class="btn" x="65" y="430" width="95" height="34"/>
  <rect class="btn" x="175" y="430" width="95" height="34"/>
  <rect class="btn" x="65" y="478" width="95" height="34"/>
  <rect class="btn" x="175" y="478" width="95" height="34"/>
  <rect class="btn" x="65" y="526" width="95" height="34"/>
  <rect class="btn" x="175" y="526" width="95" height="34"/>
  <rect class="btn" x="65" y="574" width="95" height="34"/>
  <rect class="btn" x="175" y="574" width="95" height="34"/>
  <rect class="btn" x="65" y="622" width="95" height="34"/>
  <rect class="btn" x="175" y="622" width="95" height="34"/>
  <text class="small" x="95" y="453">B1 / G14</text>
  <text class="small" x="205" y="453">B2 / G13</text>
  <text class="small" x="95" y="501">B3 / G15</text>
  <text class="small" x="208" y="501">B4 / G2</text>
  <text class="small" x="95" y="549">B5 / G4</text>
  <text class="small" x="205" y="549">B6 / G16</text>
  <text class="small" x="95" y="597">B7 / G17</text>
  <text class="small" x="208" y="597">B8 / G5</text>
  <text class="small" x="95" y="645">B9 / G18</text>
  <text class="small" x="198" y="645">B10 / TBD</text>
  <text class="small" x="65" y="700">Jeder Taster:</text>
  <text class="small" x="65" y="724">eine Seite an 3V3</text>
  <text class="small" x="65" y="748">eine Seite an GPIO</text>
  <text class="small" x="65" y="772">Firmware nutzt INPUT_PULLDOWN</text>

  <rect class="sensor" x="40" y="960" width="260" height="110"/>
  <text class="head" x="65" y="998">Optional</text>
  <text class="text" x="65" y="1028">DHT11: DATA an GPIO12</text>
  <text class="text" x="65" y="1056">VCC an 3V3, GND an GND</text>

  <path class="wire pwr5" d="M300 190 C330 190, 330 190, 360 190"/>
  <path class="wire pwr5" d="M300 220 C540 220, 620 220, 840 220"/>
  <path class="wire pwr5" d="M300 220 C560 220, 650 760, 840 760"/>
  <path class="wire gnd" d="M300 280 C520 280, 640 560, 840 570"/>
  <path class="wire gnd" d="M300 280 C560 280, 640 878, 840 878"/>
  <path class="wire pwr33" d="M300 250 C330 250, 330 675, 360 675"/>

  <path class="wire sig" d="M740 270 C800 270, 800 240, 840 240"/>
  <path class="wire sig" d="M740 300 C810 300, 810 275, 840 275"/>
  <path class="wire sig" d="M740 330 C820 330, 820 310, 840 310"/>
  <path class="wire sig" d="M740 360 C820 360, 820 345, 840 345"/>
  <path class="wire sig" d="M740 390 C820 390, 820 380, 840 380"/>
  <path class="wire sig" d="M740 420 C820 420, 820 415, 840 415"/>
  <path class="wire sig" d="M740 450 C820 450, 820 450, 840 450"/>
  <path class="wire sig" d="M740 480 C820 480, 820 485, 840 485"/>
  <path class="wire sig" d="M740 510 C810 510, 810 808, 840 808"/>
  <path class="wire sig dash" d="M740 540 C810 540, 810 843, 840 843"/>

  <path class="wire sig" d="M1200 240 C1260 240, 1260 197, 1310 197"/>
  <path class="wire sig" d="M1200 275 C1320 275, 1320 197, 1510 197"/>
  <path class="wire sig" d="M1200 310 C1260 310, 1260 257, 1310 257"/>
  <path class="wire sig" d="M1200 345 C1320 345, 1320 257, 1510 257"/>
  <path class="wire sig" d="M1200 380 C1260 380, 1260 317, 1310 317"/>
  <path class="wire sig" d="M1200 415 C1320 415, 1320 317, 1510 317"/>
  <path class="wire sig" d="M1200 450 C1260 450, 1260 377, 1310 377"/>
  <path class="wire sig" d="M1200 485 C1320 485, 1320 377, 1510 377"/>
  <path class="wire sig" d="M1200 808 C1260 808, 1260 497, 1310 497"/>
  <path class="wire sig dash" d="M1200 843 C1320 843, 1320 497, 1510 497"/>

  <path class="wire pwr33" d="M160 250 C160 250, 160 430, 160 639"/>
  <path class="wire sig" d="M270 447 C315 447, 315 615, 360 615"/>
  <path class="wire sig" d="M160 495 C315 495, 315 615, 360 615"/>
  <path class="wire sig" d="M270 495 C320 495, 320 615, 360 615"/>
  <path class="wire sig" d="M160 543 C325 543, 325 615, 360 615"/>
  <path class="wire sig" d="M270 543 C330 543, 330 615, 360 615"/>
  <path class="wire sig" d="M160 591 C335 591, 335 645, 360 645"/>
  <path class="wire sig" d="M270 591 C340 591, 340 645, 360 645"/>
  <path class="wire sig" d="M160 639 C345 639, 345 645, 360 645"/>
  <path class="wire sig dash" d="M270 639 C350 639, 350 645, 360 645"/>

  <path class="wire sig dash" d="M300 1015 C330 1015, 330 730, 360 730"/>
  <path class="wire pwr33 dash" d="M300 1040 C335 1040, 335 1040, 360 1040"/>
  <path class="wire gnd dash" d="M300 1065 C340 1065, 340 1065, 380 1065"/>

  <text class="small" x="760" y="548">noch in Hardware festzulegen</text>
  <text class="small" x="1530" y="536">optional Hauptventil / Drainage</text>
  <text class="small" x="1080" y="926">Gestrichelte Leitungen = geplanter 10. Kanal / optionale Komponenten</text>
</svg>
