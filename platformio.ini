; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
; Exclude native from default build – it has no src files to compile.
; Use "pio test -e native" to run unit tests on the host.
default_envs = az-delivery-devkit-v4-usb, az-delivery-devkit-v4-ota

[env:az-delivery-devkit-v4-usb]
platform = espressif32
board = az-delivery-devkit-v4
framework = arduino
monitor_speed = 115200
test_ignore = test_native_*
build_flags =
  -I $PROJECT_DIR/..
  -I src/app
  -I src/config
  -I src/contracts
  -I src/domain
  -I src/infrastructure
  -I src/services

lib_deps = 
  PubSubClient
  ArduinoJson
  ArduinoOTA

[env:az-delivery-devkit-v4-ota]
platform = espressif32
board = az-delivery-devkit-v4
framework = arduino
monitor_speed = 115200
test_ignore = test_native_*
build_flags =
  -I $PROJECT_DIR/..
  -I src/app
  -I src/config
  -I src/contracts
  -I src/domain
  -I src/infrastructure
  -I src/services

lib_deps = 
  PubSubClient
  ArduinoJson
  ArduinoOTA

; OTA Upload configuration
upload_protocol = espota
upload_port = 192.168.60.189  ; Will be auto-discovered or use IP
upload_flags = 
  --port=3232
  --auth=your_ota_password_here

; ---- Native unit-test environment ----------------------------------------
; Runs on the host (Windows/Linux), no ESP32 board or framework needed.
; Only compiles files under lib/domain – no Arduino/ESP headers required.
[env:native]
platform = native
test_framework = unity
test_build_src = false
test_ignore = test_embedded_*
extra_scripts =
  pre:scripts/native_toolchain.py
build_flags =
  -std=c++14
  -I $PROJECT_DIR/..
  -I src/app
  -I src/config
  -I src/contracts
  -I src/domain
  -I src/infrastructure
  -I src/services
  -I test/support
  -static
  -static-libgcc
  -static-libstdc++
build_src_filter =
  -<*>
